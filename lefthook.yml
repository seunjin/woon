commit-msg:
  commands:
    commitlint:
      run: PATH="/opt/homebrew/bin:$PATH" ./node_modules/.bin/commitlint --edit {1}

pre-commit:
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: PATH="/opt/homebrew/bin:$PATH" ./node_modules/.bin/biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
